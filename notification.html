<!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Notifications</title>
    <link rel="stylesheet" href="notification.css" />
    </head>
    <body>

    <div class="header">
        <button class="close-btn" id="closeNotificationBtn" aria-label="Close notification" title="Back to Dashboard">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" fill="#e5e5b7" stroke="#bdbd8d" stroke-width="4"/>
            <line x1="16" y1="16" x2="32" y2="32" stroke="#bdbd8d" stroke-width="4" stroke-linecap="round"/>
            <line x1="32" y1="16" x2="16" y2="32" stroke="#bdbd8d" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </button>
    </div>
    
    <div class="notification-body">
        <h2>Notifications</h2>
        <div class="notification-list" id="notificationList">
        <!-- Items injected via JS -->
        </div>
    </div>

    <script src="notification.js"></script>
    <script>
    document.getElementById('closeNotificationBtn').onclick = function() {
      window.location.href = 'IMS.html';
    };
    </script>
    </body>
    </html>
